<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="의전 영어 2.0">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>축구 구단 의전 영어 2.0</title>
<style>
:root {
 --bg:#f4f6f8;--card:#fff;--text:#121417;--muted:#68707c;--line:#e2e6ea;
 --accent:#111827;--soft:#eef1f4;--good:#176b3a;--warn:#9a6700;
}
body.dark {
 --bg:#0f1115;--card:#181b21;--text:#f3f4f6;--muted:#a5acb8;--line:#2b3038;
 --accent:#f3f4f6;--soft:#232831;--good:#79d79a;--warn:#ffd166;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input{font:inherit}
.header{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.header-in{max-width:820px;margin:auto;padding:calc(14px + env(safe-area-inset-top)) 16px 12px}
.top{display:flex;justify-content:space-between;gap:12px;align-items:center}
h1{font-size:22px;margin:0}
.sub{font-size:12px;color:var(--muted);margin-top:3px}
.icon-btn{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:12px;width:42px;height:42px;cursor:pointer}
.search{margin-top:12px}
.search input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:14px;background:var(--card);color:var(--text);outline:none}
.tabs{display:flex;gap:8px;overflow:auto;padding-top:10px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{border:1px solid var(--line);background:var(--card);color:var(--text);padding:8px 12px;border-radius:999px;white-space:nowrap;cursor:pointer;font-size:13px}
.tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
main{max-width:820px;margin:auto;padding:16px 16px 110px}
.dashboard{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;text-align:center}
.stat b{display:block;font-size:20px;margin-bottom:3px}
.stat span{font-size:12px;color:var(--muted)}
.hero{background:linear-gradient(135deg,#111827,#374151);color:#fff;border-radius:20px;padding:18px;margin-bottom:14px}
.hero h2{margin:0 0 6px;font-size:19px}
.hero p{margin:0;color:#d7dce3;font-size:13px;line-height:1.5}
.hero-actions{display:flex;gap:8px;margin-top:13px}
.hero button{border:0;border-radius:11px;padding:10px 12px;cursor:pointer}
.primary{background:#fff;color:#111827}
.secondary{background:#4b5563;color:#fff}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;margin-bottom:10px;overflow:hidden}
.card-head{display:grid;grid-template-columns:1fr auto;gap:10px;padding:15px;cursor:pointer}
.meta{font-size:12px;color:var(--muted);margin-bottom:7px}
.en{font-size:17px;font-weight:750;line-height:1.45}
.hint{font-size:11px;color:var(--muted);margin-top:7px}
.actions{display:flex;gap:5px}
.small{border:0;background:var(--soft);color:var(--text);width:38px;height:38px;border-radius:11px;cursor:pointer}
.small.done{background:#dff4e6;color:#14532d}
body.dark .small.done{background:#193b28;color:#9be2b5}
.small.starred{background:#fff2b8;color:#7a5600}
.reveal{display:none;border-top:1px solid var(--line);padding:15px}
.card.open .reveal{display:block}
.ko{font-weight:700;line-height:1.55}
.words{margin-top:10px;background:var(--soft);padding:11px;border-radius:11px;color:var(--muted);font-size:14px;line-height:1.55}
.empty{text-align:center;color:var(--muted);padding:60px 10px}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:40;background:color-mix(in srgb,var(--card) 95%,transparent);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom))}
.bottom-in{max-width:820px;margin:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.nav{border:0;background:transparent;color:var(--muted);padding:7px 2px;border-radius:10px;cursor:pointer;font-size:11px}
.nav strong{display:block;font-size:19px}
.nav.active{background:var(--soft);color:var(--text)}
.modal-wrap{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:18px}
.modal-wrap.show{display:flex}
.modal{width:min(520px,100%);max-height:88vh;overflow:auto;background:var(--card);border-radius:22px;padding:20px;color:var(--text)}
.modal h2{margin:0 0 12px}
.quiz-q{font-size:19px;font-weight:750;line-height:1.5;margin:16px 0}
.option{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--text);padding:13px;border-radius:12px;margin:8px 0;cursor:pointer}
.option.correct{border-color:#35a05f;background:#e6f6eb;color:#14532d}
.option.wrong{border-color:#c94c4c;background:#fdeaea;color:#7f1d1d}
.close{width:100%;border:0;background:var(--accent);color:var(--bg);padding:12px;border-radius:12px;margin-top:12px;cursor:pointer}
.progressbar{height:10px;background:var(--soft);border-radius:999px;overflow:hidden;margin-top:9px}
.progressbar i{display:block;height:100%;background:var(--good);width:0}
@media(max-width:520px){.dashboard{grid-template-columns:repeat(3,1fr)} .stat{padding:10px 6px}}
</style>
</head>
<body>
<header class="header">
<div class="header-in">
<div class="top">
<div><h1>⚽ 의전 영어 2.0</h1><div class="sub">대전하나시티즌 국제업무 실전형</div></div>
<div><button class="icon-btn" id="darkBtn">🌙</button> <button class="icon-btn" id="helpBtn">?</button></div>
</div>
<div class="search"><input id="search" type="search" placeholder="영어·한글·단어 검색"></div>
<div class="tabs" id="tabs"></div>
</div>
</header>

<main>
<section class="dashboard">
<div class="stat"><b id="learnedCount">0</b><span>학습 완료</span></div>
<div class="stat"><b id="favCount">0</b><span>즐겨찾기</span></div>
<div class="stat"><b id="progressPct">0%</b><span>전체 진도</span></div>
</section>

<section class="hero" id="hero">
<h2>오늘의 10문장</h2>
<p>하루에 10문장씩 확인하고 학습 완료를 눌러보세요.</p>
<div class="progressbar"><i id="dailyBar"></i></div>
<div class="hero-actions">
<button class="primary" id="dailyBtn">오늘 문장 보기</button>
<button class="secondary" id="quizBtn">5문제 퀴즈</button>
</div>
</section>

<div id="count" class="sub" style="margin:0 2px 10px"></div>
<section id="list"></section>
</main>

<nav class="bottom"><div class="bottom-in">
<button class="nav active" data-mode="all"><strong>📚</strong>전체</button>
<button class="nav" data-mode="daily"><strong>☀️</strong>오늘</button>
<button class="nav" data-mode="favorites"><strong>⭐</strong>즐겨찾기</button>
<button class="nav" data-mode="learned"><strong>✅</strong>학습완료</button>
<button class="nav" id="topBtn"><strong>⬆️</strong>위로</button>
</div></nav>

<div class="modal-wrap" id="quizModal"><div class="modal">
<h2>의전 영어 퀴즈</h2>
<div id="quizBody"></div>
<button class="close" id="closeQuiz">닫기</button>
</div></div>

<div class="modal-wrap" id="helpModal"><div class="modal">
<h2>사용 방법</h2>
<p>문장을 누르면 한글 뜻과 핵심 단어가 나옵니다.</p>
<p>🔊 발음 듣기 · ☆ 즐겨찾기 · ✓ 학습 완료를 사용할 수 있습니다.</p>
<p>아이폰 Safari에서는 공유 → 홈 화면에 추가, 안드로이드 Chrome에서는 메뉴 → 앱 설치 또는 홈 화면에 추가를 누르세요.</p>
<button class="close" id="closeHelp">확인</button>
</div></div>

<script>
const DATA=[{"id": 1, "en": "Welcome to Korea.", "ko": "한국에 오신 것을 환영합니다.", "words": "welcome: 환영하다 / Korea: 한국", "category": "공항 영접", "icon": "✈️"}, {"id": 2, "en": "Welcome to Daejeon.", "ko": "대전에 오신 것을 환영합니다.", "words": "welcome: 환영하다 / Daejeon: 대전", "category": "공항 영접", "icon": "✈️"}, {"id": 3, "en": "It's a pleasure to meet you.", "ko": "만나 뵙게 되어 반갑습니다.", "words": "pleasure: 기쁨, 영광 / meet: 만나다", "category": "공항 영접", "icon": "✈️"}, {"id": 4, "en": "I hope you had a pleasant flight.", "ko": "편안한 비행이셨기를 바랍니다.", "words": "hope: 바라다 / pleasant: 편안한, 즐거운 / flight: 비행", "category": "공항 영접", "icon": "✈️"}, {"id": 5, "en": "Did you have a comfortable flight?", "ko": "비행은 편안하셨나요?", "words": "comfortable: 편안한 / flight: 비행", "category": "공항 영접", "icon": "✈️"}, {"id": 6, "en": "May I help you with your luggage?", "ko": "짐을 도와드릴까요?", "words": "help A with B: A의 B를 돕다 / luggage: 짐", "category": "공항 영접", "icon": "✈️"}, {"id": 7, "en": "Our vehicle is waiting outside.", "ko": "저희 차량이 밖에서 대기 중입니다.", "words": "vehicle: 차량 / wait: 기다리다 / outside: 밖에", "category": "공항 영접", "icon": "✈️"}, {"id": 8, "en": "This way, please.", "ko": "이쪽으로 오시죠.", "words": "this way: 이쪽으로 / please: 부디", "category": "공항 영접", "icon": "✈️"}, {"id": 9, "en": "Please watch your step.", "ko": "발밑을 조심해 주세요.", "words": "watch your step: 발밑을 조심하다", "category": "공항 영접", "icon": "✈️"}, {"id": 10, "en": "Thank you for coming.", "ko": "와주셔서 감사합니다.", "words": "thank you for ~ing: ~해주셔서 감사합니다", "category": "공항 영접", "icon": "✈️"}, {"id": 11, "en": "Please make yourself comfortable.", "ko": "편하게 계세요.", "words": "make yourself comfortable: 편하게 있다", "category": "차량 이동", "icon": "🚗"}, {"id": 12, "en": "We'll head to the hotel now.", "ko": "이제 호텔로 이동하겠습니다.", "words": "head to: ~로 향하다 / hotel: 호텔", "category": "차량 이동", "icon": "🚗"}, {"id": 13, "en": "It'll take about 30 minutes.", "ko": "약 30분 정도 걸립니다.", "words": "take: 시간이 걸리다 / about: 약", "category": "차량 이동", "icon": "🚗"}, {"id": 14, "en": "Traffic is a little heavy right now.", "ko": "현재 교통이 조금 막힙니다.", "words": "traffic: 교통 / heavy: 혼잡한 / right now: 지금", "category": "차량 이동", "icon": "🚗"}, {"id": 15, "en": "We'll arrive shortly.", "ko": "곧 도착하겠습니다.", "words": "arrive: 도착하다 / shortly: 곧", "category": "차량 이동", "icon": "🚗"}, {"id": 16, "en": "Is this your first visit to Korea?", "ko": "한국 방문은 처음이신가요?", "words": "first visit: 첫 방문", "category": "차량 이동", "icon": "🚗"}, {"id": 17, "en": "Have you been to Daejeon before?", "ko": "전에 대전에 와보신 적 있으신가요?", "words": "have been to: ~에 가본 적이 있다 / before: 전에", "category": "차량 이동", "icon": "🚗"}, {"id": 18, "en": "How long will you be staying in Korea?", "ko": "한국에 얼마나 머무르실 예정인가요?", "words": "how long: 얼마나 오래 / stay: 머무르다", "category": "차량 이동", "icon": "🚗"}, {"id": 19, "en": "Please let me know if you need anything.", "ko": "필요한 것이 있으시면 말씀해 주세요.", "words": "let me know: 알려주다 / need: 필요하다", "category": "차량 이동", "icon": "🚗"}, {"id": 20, "en": "Would you like some water?", "ko": "물 좀 드시겠습니까?", "words": "would you like: ~하시겠습니까 / water: 물", "category": "차량 이동", "icon": "🚗"}, {"id": 21, "en": "I'll help you with the check-in.", "ko": "체크인을 도와드리겠습니다.", "words": "check-in: 체크인", "category": "호텔", "icon": "🏨"}, {"id": 22, "en": "Your room is ready.", "ko": "객실이 준비되었습니다.", "words": "room: 객실 / ready: 준비된", "category": "호텔", "icon": "🏨"}, {"id": 23, "en": "Breakfast is served from 7 to 10 a.m.", "ko": "조식은 오전 7시부터 10시까지 제공됩니다.", "words": "breakfast: 조식 / be served: 제공되다", "category": "호텔", "icon": "🏨"}, {"id": 24, "en": "The elevator is over there.", "ko": "엘리베이터는 저쪽에 있습니다.", "words": "elevator: 엘리베이터 / over there: 저쪽에", "category": "호텔", "icon": "🏨"}, {"id": 25, "en": "The fitness center is on the second floor.", "ko": "피트니스센터는 2층에 있습니다.", "words": "fitness center: 피트니스센터 / second floor: 2층", "category": "호텔", "icon": "🏨"}, {"id": 26, "en": "Your luggage will be brought to your room.", "ko": "짐은 객실로 가져다드리겠습니다.", "words": "be brought: 가져다지다 / luggage: 짐", "category": "호텔", "icon": "🏨"}, {"id": 27, "en": "Please let mode='all', category='전체', query='';
let favorites=new Set(JSON.parse(localStorage.getItem('fav2')||'[]'));
let learned=new Set(JSON.parse(localStorage.getItem('learned2')||'[]'));
const todayKey=new Date().toISOString().slice(0,10);
function seededDaily(){
  let seed=[...todayKey].reduce((a,c)=>a+c.charCodeAt(0),0);
  let arr=[...DATA];
  for(let i=arr.length-1;i>0;i--){seed=(seed*9301+49297)%233280;let j=Math.floor(seed/233280*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}
  return arr.slice(0,10).map(x=>x.id);
}
const dailyIds=seededDaily();

function save(){localStorage.setItem('fav2',JSON.stringify([...favorites]));localStorage.setItem('learned2',JSON.stringify([...learned]));}
function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]);}
function speak(t){if(!speechSynthesis)return; speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.86;speechSynthesis.speak(u);}
function updateStats(){
 document.getElementById('learnedCount').textContent=learned.size;
 document.getElementById('favCount').textContent=favorites.size;
 document.getElementById('progressPct').textContent=Math.round(learned.size/DATA.length*100)+'%';
 let done=dailyIds.filter(id=>learned.has(id)).length;
 document.getElementById('dailyBar').style.width=(done/10*100)+'%';
}
const cats=['전체',...new Set(DATA.map(x=>x.icon+' '+x.category))];
function renderTabs(){
 tabs.innerHTML=cats.map(c=>`<button class="tab ${c===category?'active':''}" data-c="${c}">${c}</button>`).join('');
 tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{category=b.dataset.c;renderTabs();render();});
}
function filtered(){
 return DATA.filter(x=>{
  const c=category==='전체'||category===x.icon+' '+x.category;
  const m=mode==='all'||(mode==='favorites'&&favorites.has(x.id))||(mode==='learned'&&learned.has(x.id))||(mode==='daily'&&dailyIds.includes(x.id));
  const q=(x.en+' '+x.ko+' '+x.words+' '+x.category).toLowerCase().includes(query.toLowerCase());
  return c&&m&&q;
 });
}
function render(){
 const a=filtered(); count.textContent=`${a.length}개 문장`;
 if(!a.length){list.innerHTML='<div class="empty">표시할 문장이 없습니다.</div>';updateStats();return}
 list.innerHTML=a.map(x=>`<article class="card" data-id="${x.id}">

 <div class="actions"><button class="small sp">🔊</button><button class="small fv ${favorites.has(x.id)?'starred':''}">${favorites.has(x.id)?'★':'☆'}</button><button class="small dn ${learned.has(x.id)?'done':''}">✓</button></div></div>
 <div class="reveal"><div class="ko">${escapeHtml(x.ko)}</div><div class="words"><b>핵심 단어</b><br>${escapeHtml(x.words)}</div></div></article>`).join('');
 document.querySelectorAll('.card').forEach(c=>{
  let id=+c.dataset.id,x=DATA.find(v=>v.id===id);
  c.querySelector('.card-head').onclick=e=>{if(!e.target.closest('button'))c.classList.toggle('open')};
  c.querySelector('.sp').onclick=e=>{e.stopPropagation();speak(x.en)};
  c.querySelector('.fv').onclick=e=>{e.stopPropagation();favorites.has(id)?favorites.delete(id):favorites.add(id);save();render()};
  c.querySelector('.dn').onclick=e=>{e.stopPropagation();learned.has(id)?learned.delete(id):learned.add(id);save();render()};
 });
 updateStats();
}
search.oninput=e=>{query=e.target.value.trim();render()};

  quizBody.querySelectorAll('.option').forEach(b=>b.onclick=()=>{
   quizBody.querySelectorAll('.option').forEach(x=>x.disabled=true);
   if(b.textContent===q.ko){b.classList.add('correct');score++}else{b.classList.add('wrong');[...quizBody.querySelectorAll('.option')].find(x=>x.textContent===q.ko)?.classList.add('correct')}
   setTimeout(()=>{idx++;qrender()},850);
  });
 }
 qrender();
}
quizBtn.onclick=quiz;
closeQuiz.onclick=()=>quizModal.classList.remove('show');
helpBtn.onclick=()=>helpModal.classList.add('show');
closeHelp.onclick=()=>helpModal.classList.remove('show');
[quizModal,helpModal].forEach(m=>m.onclick=e=>{if(e.target===m)m.classList.remove('show')});
renderTabs();render();
if('serviceWorker' in navigator&&location.protocol.startsWith('http'))navigator.serviceWorker.register('service-worker.js').catch(()=>{});
</script>
</body>
